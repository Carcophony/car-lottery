<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Carcophony 25 – Line Racer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@400;600;700;900&display=swap');

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0e0e0e;
    --dark2: #1a1a1a;
    --dark3: #252525;
    --cream: #f5ead7;
    --green: #4caf7d;
    --red: #e04848;
    --tile-border: #3a3020;
    --shadow: 0 4px 24px rgba(0,0,0,0.7);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Raleway', sans-serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      repeating-linear-gradient(45deg, rgba(201,168,76,0.03) 0px, rgba(201,168,76,0.03) 1px, transparent 1px, transparent 50px),
      repeating-linear-gradient(-45deg, rgba(201,168,76,0.03) 0px, rgba(201,168,76,0.03) 1px, transparent 1px, transparent 50px);
  }

  /* ===== VIEWS ===== */
  .view { display: none; min-height: 100vh; }
  .view.active { display: flex; flex-direction: column; }

  /* ===== MAIN MENU ===== */
  #menu {
    align-items: center;
    padding: 20px 16px 40px;
  }

  .logo-area {
    text-align: center;
    margin-bottom: 24px;
    padding-top: 10px;
  }

  .logo-area h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    text-shadow: none;
    filter: drop-shadow(0 2px 8px rgba(201,168,76,0.4));
  }

  .logo-area p {
    font-size: clamp(12px, 3vw, 16px);
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
    opacity: 0.85;
  }

  /* Line Cards */
  .line-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 24px;
  }

  .line-card {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .line-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .line-card:hover::before, .line-card:active::before { opacity: 1; }
  .line-card:hover { border-color: var(--gold); transform: translateY(-1px); box-shadow: 0 6px 30px rgba(201,168,76,0.2); }
  .line-card:active { transform: scale(0.98); }

  .line-thumb {
    width: 80px;
    height: 54px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid rgba(201,168,76,0.2);
    background: var(--dark3);
  }

  .line-thumb-fallback {
    width: 80px;
    height: 54px;
    border-radius: 8px;
    flex-shrink: 0;
    border: 1px solid rgba(201,168,76,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .line-info { flex: 1; }
  .line-info .line-name {
    font-weight: 700;
    font-size: clamp(13px, 3.2vw, 17px);
    color: var(--cream);
  }
  .line-info .line-positions {
    font-size: 11px;
    color: rgba(245,234,215,0.5);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  .line-info .line-best {
    font-size: 13px;
    color: var(--gold);
    margin-top: 3px;
  }
  .line-info .line-best.done { color: var(--green); }

  .line-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-left: 4px;
  }

  .line-status {
    font-size: 22px;
    flex-shrink: 0;
  }

  /* Series Panel */
  .series-panel {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 12px;
    padding: 16px 20px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 20px;
    text-align: center;
  }

  .series-panel h3 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    color: var(--gold);
    font-size: 20px;
    margin-bottom: 8px;
  }

  .series-panel p {
    font-size: 14px;
    color: var(--cream);
    opacity: 0.8;
    line-height: 1.6;
  }

  .series-panel .series-time {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold-light);
    margin: 4px 0;
  }

  /* How to play */
  .how-to {
    max-width: 500px;
    text-align: center;
    font-size: 13px;
    color: rgba(245,234,215,0.5);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .btn-clear {
    background: none;
    border: 1px solid rgba(224,72,72,0.4);
    color: rgba(224,72,72,0.6);
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Raleway', sans-serif;
    transition: all 0.2s;
  }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  /* ===== PLAY SCREEN ===== */
  #play {
    align-items: center;
    padding: 12px 16px 24px;
  }

  .play-header {
    width: 100%;
    max-width: 520px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .play-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 4vw, 28px);
    letter-spacing: 2px;
    color: var(--gold);
  }

  .sound-toggle {
    background: var(--dark3);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--cream);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Raleway', sans-serif;
    transition: all 0.2s;
  }
  .sound-toggle:hover { border-color: var(--gold); }

  /* Target line indicator */
  .target-line-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    padding: 8px 14px;
    width: 100%;
    max-width: 520px;
    flex-wrap: wrap;
  }

  .target-line-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gold);
    opacity: 0.7;
    flex-shrink: 0;
  }

  .target-line-nums {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .target-num-badge {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light);
    border-radius: 5px;
    padding: 2px 8px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1px;
  }

  .target-num-badge.matched {
    background: rgba(76,175,125,0.25);
    border-color: var(--green);
    color: var(--green);
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }

  .stat-box {
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 10px 16px;
    text-align: center;
  }

  .stat-box .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gold);
    opacity: 0.7;
  }

  .stat-box .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
    color: var(--cream);
    line-height: 1.1;
  }

  /* PUZZLE GRID */
  .puzzle-wrapper {
    width: 100%;
    max-width: min(88vw, 88vh - 280px, 440px);
    aspect-ratio: 1;
    position: relative;
    margin-bottom: 14px;
  }

  .puzzle-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    width: 100%;
    height: 100%;
    gap: 2px;
    background: var(--dark);
    border: 2px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .tile {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    border-radius: 2px;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .tile:hover { filter: brightness(1.15); }
  .tile:active { transform: scale(0.95); }

  .tile.blank {
    background: var(--dark) !important;
    cursor: default;
    border: 1px solid rgba(201,168,76,0.05);
  }
  .tile.blank:hover { filter: none; }

  /* Gold glow on target positions */
  .tile.target-glow {
    box-shadow: inset 0 0 0 2px gold, 0 0 10px rgba(255, 215, 0, 0.6);
    animation: targetPulse 1.6s ease-in-out infinite;
    z-index: 2;
  }

  @keyframes targetPulse {
    0%, 100% { box-shadow: inset 0 0 0 2px gold, 0 0 8px rgba(255,215,0,0.5); }
    50%       { box-shadow: inset 0 0 0 3px #ffe040, 0 0 20px rgba(255,215,0,0.9); }
  }

  /* Tile in the right position */
  .tile.target-glow.in-place {
    box-shadow: inset 0 0 0 3px #4caf7d, 0 0 16px rgba(76,175,125,0.8);
    animation: placedPulse 1.2s ease-in-out infinite;
  }

  @keyframes placedPulse {
    0%, 100% { box-shadow: inset 0 0 0 2px #4caf7d, 0 0 8px rgba(76,175,125,0.5); }
    50%       { box-shadow: inset 0 0 0 3px #6eff9d, 0 0 22px rgba(76,175,125,0.9); }
  }

  .tile-num {
    position: absolute;
    bottom: 3px;
    right: 5px;
    font-size: clamp(10px, 2vw, 15px);
    font-weight: 900;
    color: #000;
    text-shadow: 0 0 3px #fff, 0 0 3px #fff, 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
    pointer-events: none;
    line-height: 1;
  }

  /* Play buttons */
  .play-buttons {
    display: flex;
    gap: 12px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold), #a87c2e);
    color: #000;
    border: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'Raleway', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 3px 12px rgba(201,168,76,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(201,168,76,0.4); }
  .btn-primary:active { transform: scale(0.97); }

  .btn-secondary {
    background: var(--dark3);
    color: var(--cream);
    border: 1px solid rgba(201,168,76,0.3);
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'Raleway', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--gold); }
  .btn-secondary:active { transform: scale(0.97); }

  /* ===== WIN SCREEN ===== */
  #win {
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .win-congrats {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px, 10vw, 80px);
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.5));
    animation: pulse 2s ease-in-out infinite;
    margin-bottom: 6px;
    line-height: 1.1;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(201,168,76,0.5)); }
    50% { filter: drop-shadow(0 0 40px rgba(201,168,76,0.9)); }
  }

  .win-subtitle {
    font-size: clamp(13px, 3.2vw, 17px);
    color: var(--cream);
    opacity: 0.9;
    margin-bottom: 6px;
    line-height: 1.5;
  }

  .win-pb {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .win-line-tiles {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .win-tile-preview {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    border: 2px solid var(--gold);
    box-shadow: 0 0 16px rgba(201,168,76,0.4);
    object-fit: cover;
    animation: revealCar 0.6s ease-out both;
  }

  .win-tile-preview:nth-child(2) { animation-delay: 0.1s; }
  .win-tile-preview:nth-child(3) { animation-delay: 0.2s; }
  .win-tile-preview:nth-child(4) { animation-delay: 0.3s; }
  .win-tile-preview:nth-child(5) { animation-delay: 0.4s; }

  @keyframes revealCar {
    0% { opacity: 0; transform: scale(0.6); }
    100% { opacity: 1; transform: scale(1); }
  }

  .win-series {
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 10px;
    padding: 12px 24px;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--cream);
    opacity: 0.85;
  }

  .win-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 320px;
  }

  .btn-share {
    background: linear-gradient(135deg, #1a91da, #0d6cb5);
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'Raleway', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-share:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(29,161,242,0.3); }

  /* CONFETTI */
  .confetti-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    top: -20px;
    width: 10px;
    height: 10px;
    opacity: 0;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
  }

  /* RESPONSIVE */
  @media (max-width: 400px) {
    .stats-bar { gap: 8px; }
    .stat-box { padding: 8px 10px; }
    .stat-box .stat-value { font-size: 20px; }
    .puzzle-wrapper { max-width: min(96vw, 60vh); }
  }

  @media (min-height: 700px) and (min-width: 500px) {
    .puzzle-wrapper { max-width: min(78vw, 58vh); }
  }
</style>
</head>
<body>

<!-- AUDIO -->
<audio id="snd-slide" preload="auto">
  <source src="sounds/slide.mp3" type="audio/mpeg">
</audio>
<audio id="snd-win" preload="auto">
  <source src="sounds/win.mp3" type="audio/mpeg">
</audio>

<!-- CONFETTI -->
<div class="confetti-container" id="confetti"></div>

<!-- ===== MAIN MENU ===== -->
<div id="menu" class="view active">
  <div class="logo-area">
    <h1>Carcophony 25</h1>
    <p>Line Racer – Hit Your Winning Line!</p>
  </div>

  <div class="line-grid" id="lineGrid"></div>

  <div class="series-panel">
    <h3>Series Progress</h3>
    <div class="series-time" id="seriesTime">—</div>
    <p id="seriesStatus"></p>
  </div>

  <div class="how-to">
    <strong>How to Play:</strong> Pick a line. Slide tiles so the 5 <span style="color:gold">highlighted</span> positions contain exactly those 5 numbers. Order doesn't matter — just get them in the right spots!
  </div>

  <button class="btn-clear" onclick="clearAllScores()">Clear All Scores</button>
</div>

<!-- ===== PLAY SCREEN ===== -->
<div id="play" class="view">
  <div class="play-header" style="max-width:520px; width:100%;">
    <div class="play-title" id="playTitle">—</div>
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊 On</button>
  </div>

  <div class="target-line-bar" id="targetLineBar">
    <span class="target-line-label">Target Line:</span>
    <div class="target-line-nums" id="targetLineNums"></div>
  </div>

  <div class="stats-bar">
    <div class="stat-box">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timerDisplay">00:00</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="movesDisplay">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="bestDisplay">—</div>
    </div>
  </div>

  <div class="puzzle-wrapper">
    <div class="puzzle-grid" id="puzzleGrid"></div>
  </div>

  <div class="play-buttons">
    <button class="btn-primary" onclick="startGame(currentLine)">Restart</button>
    <button class="btn-secondary" onclick="showView('menu'); stopTimer()">Back to Menu</button>
  </div>
</div>

<!-- ===== WIN SCREEN ===== -->
<div id="win" class="view">
  <div class="win-congrats">LINE RACER!</div>
  <div class="win-subtitle" id="winSubtitle"></div>
  <div class="win-pb" id="winPB"></div>
  <div class="win-line-tiles" id="winLineTiles"></div>
  <div class="win-series" id="winSeries"></div>
  <div class="win-buttons">
    <button class="btn-share" onclick="shareResult()">🐦 Post to X (Twitter)</button>
    <button class="btn-primary" onclick="startGame(currentLine)">Play Again</button>
    <button class="btn-secondary" onclick="showView('menu')">Back to Menu</button>
  </div>
</div>

<script>
// ===== WIN LINES (1-indexed positions) =====
const WIN_LINES = [
  [1,10,14,18,22], // Green
  [2,6,15,19,23],  // Red
  [3,7,11,20,24],  // Yellow
  [4,8,12,16,25],  // Pink
  [5,9,13,17,21],  // Blue
  [1,8,15,17,24],  // F40
  [2,9,11,18,25],  // F1
  [3,10,12,19,21], // Tesla
  [4,6,13,20,22],  // Miura
  [5,7,14,16,23]   // 959
];

// ===== LINE DATA =====
const LINES = [
  {id:0, name:'Green Mono',           positions:WIN_LINES[0], repImg:'1.png',  color:'#4caf7d'},
  {id:1, name:'Red Mono',             positions:WIN_LINES[1], repImg:'2.png',  color:'#e04848'},
  {id:2, name:'Yellow Mono',          positions:WIN_LINES[2], repImg:'3.png',  color:'#f0d020'},
  {id:3, name:'Pink Mono',            positions:WIN_LINES[3], repImg:'4.png',  color:'#e87db0'},
  {id:4, name:'Blue Mono',            positions:WIN_LINES[4], repImg:'5.png',  color:'#4169e1'},
  {id:5, name:'Ferrari F40 Rainbow',  positions:WIN_LINES[5], repImg:'6.png',  color:'#b22222'},
  {id:6, name:'McLaren F1 Rainbow',   positions:WIN_LINES[6], repImg:'7.png',  color:'#4169e1'},
  {id:7, name:'Tesla Rainbow',        positions:WIN_LINES[7], repImg:'8.png',  color:'#e05020'},
  {id:8, name:'Lambo Miura Rainbow',  positions:WIN_LINES[8], repImg:'9.png',  color:'#daa520'},
  {id:9, name:'Porsche 959 Rainbow',  positions:WIN_LINES[9], repImg:'10.png', color:'#c8c8c8'},
];

const GRID_SIZE = 5;
const N = 25;

// ===== STATE =====
let currentLine = null;
let tiles = [];         // 1D array of 25 values (0 = blank, 1–25 = tiles)
let targetLineIdxs = []; // 0-indexed positions to highlight
let moves = 0;
let seconds = 0;
let timerInterval = null;
let timerStarted = false;
let soundOn = true;
let isAnimating = false;
let interacted = false;

// ===== STORAGE =====
function lsKey(lineId, type) { return `c25_line${lineId}_${type}`; }

function getBest(lineId) {
  const t = localStorage.getItem(lsKey(lineId, 'time'));
  return t ? parseInt(t) : null;
}

function saveBest(lineId, secs, mv) {
  const existing = getBest(lineId);
  let isNew = false;
  if (existing === null || secs < existing) {
    localStorage.setItem(lsKey(lineId, 'time'), secs);
    localStorage.setItem(lsKey(lineId, 'moves'), mv);
    isNew = true;
  }
  return isNew;
}

function getSeriesData() {
  let total = 0, count = 0;
  for (const line of LINES) {
    const t = getBest(line.id);
    if (t !== null) { total += t; count++; }
  }
  return { total, count };
}

function fmtTime(secs) {
  const m = Math.floor(secs / 60).toString().padStart(2, '0');
  const s = (secs % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// ===== VIEW MANAGEMENT =====
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if (name === 'menu') renderMenu();
}

// ===== MENU =====
function renderMenu() {
  const grid = document.getElementById('lineGrid');
  grid.innerHTML = '';

  for (const line of LINES) {
    const best = getBest(line.id);
    const done = best !== null;

    const card = document.createElement('div');
    card.className = 'line-card';
    card.onclick = () => startGame(line);

    // Colour dot
    const dot = document.createElement('div');
    dot.className = 'line-dot';
    dot.style.background = line.color;
    dot.style.boxShadow = `0 0 8px ${line.color}`;

    // Thumbnail
    const img = document.createElement('img');
    img.className = 'line-thumb';
    img.src = `images/${line.repImg}`;
    img.alt = line.name;
    img.onerror = function() {
      this.style.display = 'none';
      const fb = document.createElement('div');
      fb.className = 'line-thumb-fallback';
      fb.style.background = line.color;
      fb.textContent = '🏁';
      this.parentNode.insertBefore(fb, this);
    };

    const info = document.createElement('div');
    info.className = 'line-info';
    info.innerHTML = `
      <div class="line-name">${line.name}</div>
      <div class="line-positions">Positions: ${line.positions.join(', ')}</div>
      <div class="line-best ${done ? 'done' : ''}">
        ${done ? `✅ Best: ${fmtTime(best)}` : 'Not yet completed'}
      </div>
    `;

    const status = document.createElement('div');
    status.className = 'line-status';
    status.textContent = done ? '✓' : '›';

    card.appendChild(dot);
    card.appendChild(img);
    card.appendChild(info);
    card.appendChild(status);
    grid.appendChild(card);
  }

  // Series
  const { total, count } = getSeriesData();
  document.getElementById('seriesTime').textContent = count > 0 ? fmtTime(total) : '—';
  const statusEl = document.getElementById('seriesStatus');
  if (count === 10) {
    statusEl.textContent = `🏆 Series Master! All 10 lines completed. Total: ${fmtTime(total)}`;
    statusEl.style.color = '#c9a84c';
  } else {
    statusEl.textContent = `Completed: ${count}/10 | Complete all 10 for Series Master!`;
    statusEl.style.color = '';
  }
}

// ===== PUZZLE LOGIC =====
function solvedState() {
  const t = [];
  for (let i = 1; i <= 25; i++) t.push(i);
  t[24] = 0; // blank at position 24 (bottom-right)
  return t;
}

function blankIdx() { return tiles.indexOf(0); }

function getNeighbours(idx) {
  const row = Math.floor(idx / GRID_SIZE), col = idx % GRID_SIZE;
  const n = [];
  if (row > 0) n.push(idx - GRID_SIZE);
  if (row < GRID_SIZE - 1) n.push(idx + GRID_SIZE);
  if (col > 0) n.push(idx - 1);
  if (col < GRID_SIZE - 1) n.push(idx + 1);
  return n;
}

function shuffle() {
  tiles = solvedState();
  const count = 4000 + Math.floor(Math.random() * 2001); // 4000-6000
  let prevBlank = -1;
  for (let i = 0; i < count; i++) {
    const blank = blankIdx();
    const nbrs = getNeighbours(blank).filter(n => n !== prevBlank);
    const pick = nbrs[Math.floor(Math.random() * nbrs.length)];
    prevBlank = blank;
    tiles[blank] = tiles[pick];
    tiles[pick] = 0;
  }
}

// ===== CHECK WIN =====
// Win: the 5 target positions (0-indexed) contain exactly the 5 line numbers (1-indexed positions used as tile values)
function checkWin() {
  if (!currentLine) return false;
  // targetLineIdxs: 0-indexed grid positions
  // The tile VALUES that should be at those positions = their 1-indexed positions
  // e.g. WIN_LINES[0] = [1,10,14,18,22] → positions 1,10,14,18,22 → tiles at those positions should be {1,10,14,18,22}
  const targetSet = currentLine.positions.slice().sort((a,b)=>a-b);
  const gotSet = targetLineIdxs.map(idx => tiles[idx]).filter(v => v !== 0).sort((a,b)=>a-b);
  if (gotSet.length !== 5) return false;
  return gotSet.every((v, i) => v === targetSet[i]);
}

// ===== RENDER GRID =====
function renderGrid() {
  const grid = document.getElementById('puzzleGrid');
  grid.innerHTML = '';

  // Figure out which tiles are "in place" for green glow
  const targetSet = new Set(currentLine ? currentLine.positions : []);
  const targetIdxSet = new Set(targetLineIdxs);

  for (let i = 0; i < N; i++) {
    const val = tiles[i];
    const tile = document.createElement('div');
    const isTarget = targetIdxSet.has(i);
    const isBlank = val === 0;

    tile.className = 'tile' + (isBlank ? ' blank' : '');
    tile.dataset.idx = i;

    if (!isBlank) {
      tile.style.backgroundImage = `url(images/${val}.png)`;
      tile.style.backgroundSize = 'cover';
      tile.style.backgroundPosition = 'center';

      // Number label
      const num = document.createElement('div');
      num.className = 'tile-num';
      num.textContent = val;
      tile.appendChild(num);
    }

    // Highlight target positions
    if (isTarget) {
      tile.classList.add('target-glow');
      // Green only if this tile's value matches this exact position (val === i+1)
      if (!isBlank && val === i + 1) {
        tile.classList.add('in-place');
      }
    }

    tile.onclick = () => tryMove(i);
    grid.appendChild(tile);
  }

  // Update target line badges
  updateTargetBadges();
}

function updateTargetBadges() {
  if (!currentLine) return;
  const container = document.getElementById('targetLineNums');
  container.innerHTML = '';
  // Which positions have the exactly correct tile (tile value === position number)?
  const inPlace = new Set(targetLineIdxs.filter(idx => tiles[idx] === idx + 1).map(idx => idx + 1));

  for (const pos of currentLine.positions) {
    const badge = document.createElement('span');
    badge.className = 'target-num-badge' + (inPlace.has(pos) ? ' matched' : '');
    badge.textContent = pos;
    container.appendChild(badge);
  }
}

// ===== MOVE =====
function tryMove(idx) {
  if (isAnimating) return;
  const blank = blankIdx();
  if (!getNeighbours(blank).includes(idx)) return;

  if (!timerStarted) { startTimer(); timerStarted = true; }
  interacted = true;

  // Swap
  tiles[blank] = tiles[idx];
  tiles[idx] = 0;
  moves++;
  document.getElementById('movesDisplay').textContent = moves;

  playSound('slide');
  renderGrid();

  if (checkWin()) {
    setTimeout(handleWin, 200);
  }
}

// ===== TIMER =====
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    seconds++;
    document.getElementById('timerDisplay').textContent = fmtTime(seconds);
  }, 1000);
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
}

function resetTimer() {
  stopTimer();
  seconds = 0;
  timerStarted = false;
  document.getElementById('timerDisplay').textContent = '00:00';
}

// ===== START GAME =====
function startGame(line) {
  currentLine = line;
  // Convert 1-indexed positions to 0-indexed
  targetLineIdxs = line.positions.map(p => p - 1);
  moves = 0;
  isAnimating = false;
  resetTimer();

  document.getElementById('playTitle').textContent = line.name;
  document.getElementById('movesDisplay').textContent = '0';

  const best = getBest(line.id);
  document.getElementById('bestDisplay').textContent = best !== null ? fmtTime(best) : '—';

  shuffle();
  showView('play');
  renderGrid();

  // Sound toggle display
  soundOn = localStorage.getItem('c25_sound') !== 'off';
  document.getElementById('soundToggle').textContent = soundOn ? '🔊 On' : '🔇 Off';
}

// ===== WIN =====
function handleWin() {
  stopTimer();
  playSound('win');

  const isNew = saveBest(currentLine.id, seconds, moves);
  const { total, count } = getSeriesData();

  document.getElementById('winSubtitle').textContent =
    `Nailed ${currentLine.name} in ${fmtTime(seconds)} (${moves} moves)!`;

  document.getElementById('winPB').textContent =
    isNew ? '🎉 New Personal Best!' : `Personal Best: ${fmtTime(getBest(currentLine.id))}`;

  // Show winning tile images
  const winTiles = document.getElementById('winLineTiles');
  winTiles.innerHTML = '';
  for (const pos of currentLine.positions) {
    const img = document.createElement('img');
    img.className = 'win-tile-preview';
    img.src = `images/${pos}.png`;
    img.alt = `Tile ${pos}`;
    img.onerror = function() { this.style.display='none'; };
    winTiles.appendChild(img);
  }

  document.getElementById('winSeries').textContent =
    count === 10
      ? `🏆 Series Master! Total: ${fmtTime(total)}`
      : `Series: ${count}/10 completed | Running total: ${fmtTime(total)}`;

  launchConfetti();
  showView('win');
}

// ===== SOUND =====
function playSound(name) {
  if (!soundOn || !interacted) return;
  const el = document.getElementById('snd-' + name);
  if (!el) return;
  try {
    el.currentTime = 0;
    el.play().catch(() => {});
  } catch(e) {}
}

function toggleSound() {
  soundOn = !soundOn;
  localStorage.setItem('c25_sound', soundOn ? 'on' : 'off');
  document.getElementById('soundToggle').textContent = soundOn ? '🔊 On' : '🔇 Off';
}

// ===== SHARE =====
function shareResult() {
  const { total, count } = getSeriesData();
  const seriesPart = count === 10 ? ` Series PB: ${fmtTime(total)} 🏆` : ` Series: ${count}/10`;
  const text = `Nailed ${currentLine.name} on Carcophony 25 in ${fmtTime(seconds)}!${seriesPart} 🚗 https://carcophony.github.io/car-lottery/carcophony-25.html`;
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

// ===== CLEAR SCORES =====
function clearAllScores() {
  if (!confirm('Clear all scores and best times? This cannot be undone.')) return;
  for (const line of LINES) {
    localStorage.removeItem(lsKey(line.id, 'time'));
    localStorage.removeItem(lsKey(line.id, 'moves'));
  }
  renderMenu();
}

// ===== CONFETTI =====
function launchConfetti() {
  const container = document.getElementById('confetti');
  container.innerHTML = '';
  const colors = ['#c9a84c', '#f0d080', '#e04848', '#4caf7d', '#4169e1', '#fff', '#e87db0', '#f0d020'];
  for (let i = 0; i < 100; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = Math.random() * 100;
    const delay = Math.random() * 1.5;
    const dur = 2.5 + Math.random() * 2;
    const size = 6 + Math.random() * 8;
    const shape = Math.random() > 0.5 ? '50%' : '0';
    piece.style.cssText = `
      left: ${left}%;
      background: ${color};
      width: ${size}px;
      height: ${size}px;
      border-radius: ${shape};
      animation-duration: ${dur}s;
      animation-delay: ${delay}s;
    `;
    container.appendChild(piece);
  }
  setTimeout(() => { container.innerHTML = ''; }, 5000);
}

// ===== TOUCH SUPPORT =====
document.addEventListener('touchstart', function() { interacted = true; }, { once: true, passive: true });
document.addEventListener('click', function() { interacted = true; }, { once: true });

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('play').classList.contains('active')) return;
  const blank = blankIdx();
  let target = -1;
  if (e.key === 'ArrowUp')    target = blank + GRID_SIZE;
  if (e.key === 'ArrowDown')  target = blank - GRID_SIZE;
  if (e.key === 'ArrowLeft')  target = blank + 1;
  if (e.key === 'ArrowRight') target = blank - 1;
  if (target >= 0 && target < N && getNeighbours(blank).includes(target)) {
    tryMove(target);
  }
  e.preventDefault();
});

// ===== INIT =====
renderMenu();

// Re-render grid on resize
window.addEventListener('resize', () => {
  if (document.getElementById('play').classList.contains('active') && currentLine) {
    renderGrid();
  }
});
</script>
