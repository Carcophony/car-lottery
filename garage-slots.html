<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 CARCOPHONY GARAGE SLOTS 🎰</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Racing+Sans+One&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1414 50%, #1a0a0a 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
            overflow-x: hidden;
        }

        /* Neon glow background effect */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 50, 50, 0.1) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-family: 'Racing Sans One', cursive;
            font-size: clamp(2rem, 6vw, 4rem);
            color: #ffcc00;
            text-shadow: 
                0 0 10px #ff0000,
                0 0 20px #ff0000,
                0 0 30px #ff0000,
                0 0 40px #ff6600,
                0 0 70px #ff6600,
                0 0 80px #ff6600,
                0 0 100px #ff6600;
            animation: neonFlicker 3s ease-in-out infinite alternate;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }

        @keyframes neonFlicker {
            0%, 100% { opacity: 1; }
            45%, 55% { opacity: 0.8; }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ff6600;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-weight: 700;
        }

        .slot-machine {
            background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
            border: 5px solid #ffcc00;
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 
                0 0 20px rgba(255, 204, 0, 0.5),
                0 0 40px rgba(255, 102, 0, 0.3),
                inset 0 0 60px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .slot-machine::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(255, 204, 0, 0.1) 50%, 
                transparent 70%);
            animation: shine 3s linear infinite;
            pointer-events: none;
        }

        @keyframes shine {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            border: 2px solid #444;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: #ffcc00;
            text-shadow: 0 0 10px #ffcc00;
        }

        .reels-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            perspective: 1000px;
        }

        .reel-wrapper {
            flex: 1;
            max-width: 140px;
        }

        .reel {
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            border: 3px solid #333;
            border-radius: 15px;
            height: 420px;
            overflow: hidden;
            position: relative;
            box-shadow: 
                inset 0 0 20px rgba(0, 0, 0, 0.9),
                0 4px 10px rgba(0, 0, 0, 0.5);
        }

        /* Dark overlay on top and bottom rows to highlight center */
        .reel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 140px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7) 0%, transparent 100%);
            pointer-events: none;
            z-index: 5;
        }

        .reel::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 140px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, transparent 100%);
            pointer-events: none;
            z-index: 5;
        }

        .reel-strip {
            position: absolute;
            width: 100%;
            transition: transform 0.1s ease-out;
        }

        .reel-item {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }

        .reel-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        /* Winning line indicator - ALWAYS BRIGHT AND VISIBLE */
        .winning-line {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 140px;
            border-top: 4px solid #ffcc00;
            border-bottom: 4px solid #ffcc00;
            background: linear-gradient(to right, 
                transparent 0%, 
                rgba(255, 204, 0, 0.15) 50%, 
                transparent 100%);
            box-shadow: 
                inset 0 0 20px rgba(255, 204, 0, 0.3),
                0 0 20px rgba(255, 204, 0, 0.5);
            pointer-events: none;
            z-index: 10;
            animation: winningLineGlow 2s ease-in-out infinite;
        }

        @keyframes winningLineGlow {
            0%, 100% { 
                border-color: #ffcc00;
                box-shadow: 
                    inset 0 0 20px rgba(255, 204, 0, 0.3),
                    0 0 20px rgba(255, 204, 0, 0.5);
            }
            50% { 
                border-color: #ffed4e;
                box-shadow: 
                    inset 0 0 30px rgba(255, 204, 0, 0.5),
                    0 0 30px rgba(255, 204, 0, 0.8);
            }
        }

        .winning-line.active {
            border-width: 5px;
            border-color: #00ff00;
            background: linear-gradient(to right, 
                transparent 0%, 
                rgba(0, 255, 0, 0.2) 50%, 
                transparent 100%);
            box-shadow: 
                inset 0 0 30px rgba(0, 255, 0, 0.5),
                0 0 40px rgba(0, 255, 0, 0.9);
            animation: winningLinePulse 0.5s ease-in-out infinite;
        }

        @keyframes winningLinePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .handle-container {
            text-align: center;
            margin: 30px 0;
        }

        .pull-handle {
            background: linear-gradient(145deg, #ff0000, #cc0000);
            border: none;
            border-radius: 20px;
            padding: 20px 60px;
            font-family: 'Bebas Neue', cursive;
            font-size: 2rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            box-shadow: 
                0 8px 0 #880000,
                0 12px 20px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(255, 0, 0, 0.5);
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
        }

        .pull-handle::before {
            content: '🎰';
            position: absolute;
            left: 20px;
            font-size: 1.5rem;
        }

        .pull-handle:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 10px 0 #880000,
                0 14px 25px rgba(0, 0, 0, 0.6),
                0 0 30px rgba(255, 0, 0, 0.7);
        }

        .pull-handle:active {
            transform: translateY(4px);
            box-shadow: 
                0 4px 0 #880000,
                0 6px 15px rgba(0, 0, 0, 0.5),
                0 0 15px rgba(255, 0, 0, 0.4);
        }

        .pull-handle:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: 0 4px 0 #444;
            transform: none;
        }

        .result-display {
            min-height: 100px;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            border: 2px solid #444;
            text-align: center;
        }

        .result-message {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .result-message.win {
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00;
            animation: winPulse 0.5s ease-in-out infinite;
        }

        @keyframes winPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .result-message.close {
            color: #ffaa00;
        }

        .tier-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 10px 0;
            letter-spacing: 0.1em;
        }

        .tier-legendary {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #000;
            box-shadow: 0 0 20px #ffd700;
        }

        .tier-epic {
            background: linear-gradient(135deg, #9945ff, #b565ff);
            color: #fff;
            box-shadow: 0 0 20px #9945ff;
        }

        .tier-rare {
            background: linear-gradient(135deg, #00bfff, #4bffff);
            color: #000;
            box-shadow: 0 0 20px #00bfff;
        }

        .tier-common {
            background: linear-gradient(135deg, #c0c0c0, #ffffff);
            color: #000;
            box-shadow: 0 0 10px #c0c0c0;
        }

        .nudge-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .nudge-btn {
            background: linear-gradient(145deg, #00ff00, #00cc00);
            border: none;
            border-radius: 10px;
            padding: 8px 15px;
            font-size: 0.9rem;
            color: #000;
            cursor: pointer;
            box-shadow: 0 4px 0 #008800, 0 0 10px rgba(0,255,0,0.5);
            transition: all 0.1s ease;
        }

        .nudge-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 0 #008800, 0 0 15px rgba(0,255,0,0.7);
        }

        .nudge-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008800, 0 0 5px rgba(0,255,0,0.4);
        }

        .nudge-btn:disabled {
            background: #666;
            box-shadow: none;
            cursor: not-allowed;
        }

        .winner-code {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            border: 2px dashed #ffcc00;
        }

        .code-text {
            font-size: 1.2rem;
            color: #ffcc00;
            text-shadow: 0 0 10px #ffcc00;
            margin-bottom: 10px;
        }

        .code-cars {
            display: flex;
            justify-content: space-around;
            gap: 5px;
        }

        .code-car {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
        }

        .code-car img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #shareBtn {
            background: linear-gradient(145deg, #1da1f2, #0e71c8);
            border: none;
            border-radius: 20px;
            padding: 10px 30px;
            font-size: 1rem;
            color: #fff;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 0 #0a4b78, 0 0 10px rgba(29,161,242,0.5);
            display: none;
        }

        #shareBtn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 0 #0a4b78, 0 0 15px rgba(29,161,242,0.7);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            overflow-y: auto;
        }

        .modal-content {
            background: #1a1a1a;
            margin: 5% auto;
            padding: 30px;
            border: 3px solid #ffcc00;
            border-radius: 20px;
            max-width: 700px;
            box-shadow: 0 0 30px rgba(255,204,0,0.5);
        }

        .close-btn {
            float: right;
            color: #ff0000;
            font-size: 2rem;
            cursor: pointer;
            text-shadow: 0 0 10px #ff0000;
        }

        .win-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .win-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #444;
        }

        .how-to-win-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .win-line {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .line-title {
            color: #ffcc00;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .line-cars {
            display: flex;
            justify-content: space-around;
            gap: 5px;
        }

        .line-car {
            width: 40px;
            height: 40px;
        }

        .line-car img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Responsive adjustments for mobile */
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }

            .title {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .slot-machine {
                padding: 20px 15px;
            }

            .reel-wrapper {
                max-width: 80px;
            }

            .reel {
                height: 240px;
            }

            .reel-item {
                height: 80px;
                padding: 5px;
            }

            .winning-line {
                height: 80px;
            }

            .reel::before, .reel::after {
                height: 80px;
            }

            .pull-handle {
                padding: 15px 40px;
                font-size: 1.5rem;
            }

            .info-value {
                font-size: 1.2rem;
            }

            .result-message {
                font-size: 1.2rem;
            }

            .nudge-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }

            .code-car {
                width: 40px;
                height: 40px;
            }

            .modal-content {
                margin: 10% auto;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">CARCOPHONY GARAGE SLOTS</h1>
            <p class="subtitle">Pull to Win Lottery Codes!</p>
        </div>

        <div class="slot-machine">
            <div class="info-bar">
                <div class="info-item">
                    <div class="info-label">Nudges</div>
                    <div class="info-value" id="nudgesDisplay">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Spins</div>
                    <div class="info-value" id="spinsDisplay">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Wins</div>
                    <div class="info-value" id="winsDisplay">0</div>
                </div>
            </div>

            <div class="reels-container" id="reelsContainer">
                <div class="winning-line"></div>
            </div>

            <div class="handle-container">
                <button id="pullHandle" class="pull-handle">PULL</button>
            </div>

            <div class="result-display" id="resultDisplay"></div>

            <button id="shareBtn">Share on X</button>

            <div style="text-align: center; margin-top: 20px;">
                <button id="howToWinBtn" style="background: #ff6600; border: none; padding: 10px 20px; border-radius: 10px; color: #fff; cursor: pointer;">How to Win</button>
                <button id="viewWinsBtn" style="background: #ff6600; border: none; padding: 10px 20px; border-radius: 10px; color: #fff; cursor: pointer; margin-left: 10px;">View Wins</button>
            </div>
        </div>
    </div>

    <div id="winsModal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close-btn">&times;</span>
            <h2 style="color: #ffcc00; text-align: center; margin-bottom: 20px;">Your Wins</h2>
            <div id="winList" class="win-list"></div>
        </div>
    </div>

    <div id="howToWinModal" class="modal">
        <div class="modal-content">
            <span id="closeHowToWin" class="close-btn">&times;</span>
            <h2 style="color: #ffcc00; text-align: center; margin-bottom: 20px;">How to Win</h2>
            <p style="text-align: center; margin-bottom: 20px; color: #fff;">Match a full lottery line for a winner code! Partial matches earn nudges to adjust reels.</p>
            <div class="how-to-win-grid" id="howToWinGrid"></div>
        </div>
    </div>

    <script>
        // Car data - based on the lottery game grid
        const CARS = {
            1: { model: 'F40', color: 'Green' },
            8: { model: 'F40', color: 'Pink' },
            15: { model: 'F40', color: 'Red' },
            17: { model: 'F40', color: 'Blue' },
            24: { model: 'F40', color: 'Yellow' },
            2: { model: 'F1', color: 'Red' },
            9: { model: 'F1', color: 'Blue' },
            11: { model: 'F1', color: 'Yellow' },
            18: { model: 'F1', color: 'Green' },
            25: { model: 'F1', color: 'Pink' },
            3: { model: 'Tesla', color: 'Yellow' },
            10: { model: 'Tesla', color: 'Green' },
            12: { model: 'Tesla', color: 'Pink' },
            19: { model: 'Tesla', color: 'Red' },
            21: { model: 'Tesla', color: 'Blue' },
            4: { model: 'Miura', color: 'Pink' },
            6: { model: 'Miura', color: 'Red' },
            13: { model: 'Miura', color: 'Blue' },
            20: { model: 'Miura', color: 'Yellow' },
            22: { model: 'Miura', color: 'Green' },
            5: { model: '959', color: 'Blue' },
            7: { model: '959', color: 'Yellow' },
            14: { model: '959', color: 'Green' },
            16: { model: '959', color: 'Pink' },
            23: { model: '959', color: 'Red' }
        };

        // Winning lines - same as lottery
        const WINNING_LINES = {
            color: {
                'Green': [1, 10, 14, 18, 22],
                'Red': [2, 6, 15, 19, 23],
                'Yellow': [3, 7, 11, 20, 24],
                'Pink': [4, 8, 12, 16, 25],
                'Blue': [5, 9, 13, 17, 21]
            },
            model: {
                'F40': [1, 8, 15, 17, 24],
                'F1': [2, 9, 11, 18, 25],
                'Tesla': [3, 10, 12, 19, 21],
                'Miura': [4, 6, 13, 20, 22],
                '959': [5, 7, 14, 16, 23]
            }
        };

        // Tier configuration with COLLECTION VALUES
        const TIERS = {
            'F40': { name: 'Legendary', class: 'tier-legendary', rarity: 1, value: '⭐⭐⭐⭐', description: 'Ultra Rare!', nudgeBonus: 5 },
            'F1': { name: 'Epic', class: 'tier-epic', rarity: 2, value: '⭐⭐⭐', description: 'Very Rare', nudgeBonus: 4 },
            'Tesla': { name: 'Epic', class: 'tier-epic', rarity: 2, value: '⭐⭐⭐', description: 'Very Rare', nudgeBonus: 4 },
            'Miura': { name: 'Epic', class: 'tier-epic', rarity: 2, value: '⭐⭐⭐', description: 'Very Rare', nudgeBonus: 4 },
            '959': { name: 'Epic', class: 'tier-epic', rarity: 2, value: '⭐⭐⭐', description: 'Very Rare', nudgeBonus: 4 },
            'Yellow': { name: 'Common', class: 'tier-common', rarity: 4, value: '⭐', description: 'Common Find', nudgeBonus: 2 },
            'Pink': { name: 'Common', class: 'tier-common', rarity: 4, value: '⭐', description: 'Common Find', nudgeBonus: 2 },
            'Green': { name: 'Rare', class: 'tier-rare', rarity: 3, value: '⭐⭐', description: 'Uncommon', nudgeBonus: 3 },
            'Red': { name: 'Rare', class: 'tier-rare', rarity: 3, value: '⭐⭐', description: 'Uncommon', nudgeBonus: 3 },
            'Blue': { name: 'Rare', class: 'tier-rare', rarity: 3, value: '⭐⭐', description: 'Uncommon', nudgeBonus: 3 }
        };

        // Game state
        let spinning = false;
        let nudgesAvailable = 10; // START WITH 10 NUDGES!
        const MAX_NUDGES = 20; // CAP AT 20 NUDGES
        let totalSpins = 0;
        let totalWins = 0;
        let currentResult = null;
        let reelPositions = [0, 0, 0, 0, 0]; // Track current position of each reel
        let reelSizes = [30, 30, 30, 30, 30]; // Track size of each strip (starts at 30, grows on nudge if needed)

        // GitHub images path (use relative if images are in repo)
        const IMAGE_BASE = 'https://raw.githubusercontent.com/Carcophony/car-lottery/main/images/';

        function getItemHeight() {
            const firstStrip = document.getElementById('strip0');
            if (firstStrip) {
                const firstItem = firstStrip.querySelector('.reel-item');
                if (firstItem) {
                    const height = firstItem.offsetHeight;
                    return height > 0 ? height : 140;
                }
            }
            return 140;
        }

        // Initialize game
        function init() {
            createReels();
            loadGameState();
            updateDisplay();
            attachEventListeners();
            // Preload images to avoid flashes
            preloadImages();
        }

        function preloadImages() {
            Object.keys(CARS).forEach(num => {
                const img = new Image();
                img.src = `${IMAGE_BASE}${num}.png`;
            });
        }

        // Helper: Generate a random car number
        function makeRandomCarNum() {
            const carNumbers = Object.keys(CARS).map(Number);
            return carNumbers[Math.floor(Math.random() * carNumbers.length)];
        }

        function createRandomItem() {
            const carNum = makeRandomCarNum();
            const item = document.createElement('div');
            item.className = 'reel-item';
            item.innerHTML = `<img src="${IMAGE_BASE}${carNum}.png" alt="Car ${carNum}">`;
            item.dataset.carNum = carNum;
            return item;
        }

        function createReels() {
            const container = document.getElementById('reelsContainer');
            const winningLine = container.querySelector('.winning-line');
            
            for (let i = 0; i < 5; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'reel-wrapper';
                
                const reel = document.createElement('div');
                reel.className = 'reel';
                reel.id = `reel${i}`;
                
                const strip = document.createElement('div');
                strip.className = 'reel-strip';
                strip.id = `strip${i}`;
                
                // Create initial strip with 30 items
                const carNumbers = Object.keys(CARS).map(Number);
                for (let j = 0; j < 30; j++) {
                    const carNum = carNumbers[Math.floor(Math.random() * carNumbers.length)];
                    const item = document.createElement('div');
                    item.className = 'reel-item';
                    item.innerHTML = `<img src="${IMAGE_BASE}${carNum}.png" alt="Car ${carNum}">`;
                    item.dataset.carNum = carNum;
                    strip.appendChild(item);
                }
                
                reel.appendChild(strip);
                wrapper.appendChild(reel);
                container.insertBefore(wrapper, winningLine);
            }
            
            // Initialize reel positions to show middle row
            for (let i = 0; i < 5; i++) {
                const itemH = getItemHeight();
                reelPositions[i] = -itemH; // Center item 1
                updateReelPosition(i);
            }
        }

        function updateReelPosition(reelIndex, smooth = false) {
            const strip = document.getElementById(`strip${reelIndex}`);
            strip.style.transition = smooth ? 'transform 0.3s ease-out' : 'transform 0.1s ease-out';
            strip.style.transform = `translateY(${reelPositions[reelIndex]}px)`;
        }

        function attachEventListeners() {
            document.getElementById('pullHandle').addEventListener('click', pullHandle);
            document.getElementById('howToWinBtn').addEventListener('click', showHowToWin);
            document.getElementById('viewWinsBtn').addEventListener('click', showWins);
            document.getElementById('closeModal').addEventListener('click', closeModal);
            document.getElementById('closeHowToWin').addEventListener('click', closeHowToWinModal);
            document.getElementById('shareBtn').addEventListener('click', shareWin);
        }

        async function pullHandle() {
            if (spinning) return;
            
            spinning = true;
            totalSpins++;
            currentResult = null;
            nudgedReels = [false, false, false, false, false]; // Reset for new spin (but not used for limit anymore)
            
            const button = document.getElementById('pullHandle');
            button.disabled = true;
            button.textContent = 'SPINNING...';
            
            document.querySelector('.winning-line').classList.remove('active');
            document.getElementById('resultDisplay').innerHTML = '<p style="color: #999;">Spinning...</p>';
            document.getElementById('shareBtn').style.display = 'none';
            
            // Animate spin
            await spinReels();
            
            // Check result
            const result = checkWin();
            displayResult(result);
            
            button.disabled = false;
            button.textContent = 'PULL';
            spinning = false;
            
            updateDisplay();
            saveGameState();
        }

        function spinReels() {
            return new Promise(resolve => {
                const finalPositions = [];
                
                // Generate final random positions for each reel
                for (let i = 0; i < 5; i++) {
                    // Target middle section (safe from edges)
                    const randomIndex = 2 + Math.floor(Math.random() * (reelSizes[i] - 4));
                    finalPositions.push(randomIndex);
                }
                
                // Animate each reel with staggered timing
                const spinDurations = [1000, 1200, 1400, 1600, 1800];
                
                finalPositions.forEach((targetIndex, i) => {
                    setTimeout(() => {
                        const strip = document.getElementById(`strip${i}`);
                        
                        // Spin animation: go down many items then settle
                        const itemH = getItemHeight();
                        const spinAmount = itemH * (reelSizes[i] + Math.random() * 10); // Spin past full length
                        strip.style.transition = `transform ${spinDurations[i]}ms cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
                        strip.style.transform = `translateY(-${spinAmount}px)`;
                        
                        setTimeout(() => {
                            // Snap to final position
                            reelPositions[i] = -((targetIndex - 1) * itemH);
                            strip.style.transition = 'transform 0.3s ease-out';
                            strip.style.transform = `translateY(${reelPositions[i]}px)`;
                            
                            if (i === 4) {
                                setTimeout(resolve, 300);
                            }
                        }, spinDurations[i]);
                    }, i * 100);
                });
            });
        }

        function getCurrentCars() {
            const cars = [];
            for (let i = 0; i < 5; i++) {
                const strip = document.getElementById(`strip${i}`);
                const items = strip.querySelectorAll('.reel-item');
                
                const itemH = getItemHeight();
                const centerIndex = Math.floor(Math.abs(reelPositions[i]) / itemH) + 1;
                
                // Safety check
                if (centerIndex >= 0 && centerIndex < items.length) {
                    const carNum = parseInt(items[centerIndex].dataset.carNum);
                    cars.push(carNum);
                } else {
                    // Fallback
                    cars.push(parseInt(items[1].dataset.carNum));
                }
            }
            return cars;
        }

        function checkWin() {
            const cars = getCurrentCars();
            const carData = cars.map(num => CARS[num]);
            
            // Check for PERFECT same color (all different models) - BIG WIN with code
            const allSameColor = carData.every(c => c.color === carData[0].color);
            if (allSameColor) {
                const models = new Set(carData.map(c => c.model));
                if (models.size === 5) { // All different models - PERFECT!
                    return {
                        type: 'color_perfect',
                        value: carData[0].color,
                        cars: cars,
                        tier: TIERS[carData[0].color]
                    };
                } else {
                    // All same color but has duplicates - SMALL WIN (nudges only, no code)
                    return {
                        type: 'color_small',
                        value: carData[0].color,
                        cars: cars,
                        duplicates: 5 - models.size
                    };
                }
            }
            
            // Check for PERFECT same model (all different colors) - BIG WIN with code
            const allSameModel = carData.every(c => c.model === carData[0].model);
            if (allSameModel) {
                const colors = new Set(carData.map(c => c.color));
                if (colors.size === 5) { // All different colors - PERFECT!
                    return {
                        type: 'model_perfect',
                        value: carData[0].model,
                        cars: cars,
                        tier: TIERS[carData[0].model]
                    };
                } else {
                    // All same model but has duplicates - SMALL WIN (nudges only, no code)
                    return {
                        type: 'model_small',
                        value: carData[0].model,
                        cars: cars,
                        duplicates: 5 - colors.size
                    };
                }
            }
            
            // Check for partial matches (for nudges/small wins)
            const colorCounts = {};
            const modelCounts = {};
            carData.forEach(c => {
                colorCounts[c.color] = (colorCounts[c.color] || 0) + 1;
                modelCounts[c.model] = (modelCounts[c.model] || 0) + 1;
            });
            
            const maxColorMatch = Math.max(...Object.values(colorCounts));
            const maxModelMatch = Math.max(...Object.values(modelCounts));
            const bestMatch = Math.max(maxColorMatch, maxModelMatch);
            
            if (bestMatch >= 3) {
                return {
                    type: 'partial',
                    matches: bestMatch,
                    cars: cars
                };
            }
            
            return { type: 'loss', cars: cars };
        }

        function displayResult(result) {
            currentResult = result;
            const display = document.getElementById('resultDisplay');
            
            if (result.type === 'color_perfect' || result.type === 'model_perfect') {
                totalWins++;
                document.querySelector('.winning-line').classList.add('active');
                
                const winType = result.type === 'color_perfect' ? `All ${result.value} Cars` : `All ${result.value}s`;
                const code = generateWinCode(result);
                
                nudgesAvailable = Math.min(nudgesAvailable + result.tier.nudgeBonus, MAX_NUDGES);
                
                display.innerHTML = `
                    <div class="result-message win">PERFECT WIN!</div>
                    <div class="tier-badge ${result.tier.class}">${result.tier.name}</div>
                    <p style="color: #fff; margin: 10px 0;">${winType} - All Different!</p>
                    <p style="color: #ffaa00; font-size: 1rem;">${result.tier.value} ${result.tier.description}</p>
                    <p style="color: #00ff00; font-size: 1rem; margin-top: 10px;">+${result.tier.nudgeBonus} Nudge${result.tier.nudgeBonus > 1 ? 's' : ''} Bonus!</p>
                    <div class="winner-code">
                        <div class="code-text">${code.text}</div>
                        <div class="code-cars">
                            ${result.cars.map(num => `
                                <div class="code-car">
                                    <img src="${IMAGE_BASE}${num}.png" alt="Car ${num}">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <p style="color: #ffcc00; margin-top: 15px;">Screenshot this code!</p>
                    <p style="color: #999; font-size: 0.9rem;">Collect codes to unlock future games!</p>
                `;
                
                document.getElementById('shareBtn').style.display = 'block';
                
                saveWin(code, result);
                
            } else if (result.type === 'color_small' || result.type === 'model_small') {
                document.querySelector('.winning-line').classList.add('active');
                
                const winType = result.type === 'color_small' ? `All ${result.value} Cars!` : `All ${result.value}s!`;
                const nudgesEarned = 4;
                nudgesAvailable = Math.min(nudgesAvailable + nudgesEarned, MAX_NUDGES);
                
                display.innerHTML = `
                    <div class="result-message" style="color: #ffaa00; text-shadow: 0 0 15px #ffaa00;">SMALL WIN!</div>
                    <p style="color: #fff; margin: 10px 0;">${winType}</p>
                    <p style="color: #ff9900; font-size: 0.95rem;">Line has ${result.duplicates} duplicate${result.duplicates > 1 ? 's' : ''}</p>
                    <p style="color: #00ff00; font-size: 1.3rem; margin-top: 10px;">+${nudgesEarned} Nudges Earned!</p>
                    <p style="color: #999; font-size: 0.9rem; margin-top: 10px;">Get all different for a winner code!</p>
                `;
                
            } else if (result.type === 'partial' && result.matches >= 3) {
                const nudgesEarned = result.matches === 4 ? 5 : 3;
                nudgesAvailable = Math.min(nudgesAvailable + nudgesEarned, MAX_NUDGES);
                
                const carData = result.cars.map(num => CARS[num]);
                
                const colorCounts = {};
                const modelCounts = {};
                carData.forEach(c => {
                    colorCounts[c.color] = (colorCounts[c.color] || 0) + 1;
                    modelCounts[c.model] = (modelCounts[c.model] || 0) + 1;
                });
                
                let matchType = '';
                let whatYouNeed = '';
                
                const maxColor = Object.keys(colorCounts).reduce((a, b) => colorCounts[a] > colorCounts[b] ? a : b);
                const maxModel = Object.keys(modelCounts).reduce((a, b) => modelCounts[a] > modelCounts[b] ? a : b);
                
                if (colorCounts[maxColor] >= modelCounts[maxModel]) {
                    matchType = `${colorCounts[maxColor]} ${maxColor} cars`;
                    whatYouNeed = `You need 5 DIFFERENT models all in ${maxColor} to win!`;
                } else {
                    matchType = `${modelCounts[maxModel]} ${maxModel}s`;
                    whatYouNeed = `You need 5 DIFFERENT colors of ${maxModel}s to win!`;
                }
                
                display.innerHTML = `
                    <div class="result-message close">SO CLOSE!</div>
                    <p style="color: #fff; margin: 10px 0;">You matched ${matchType}!</p>
                    <p style="color: #ff6600; font-size: 0.95rem; margin: 10px 0;">${whatYouNeed}</p>
                    <p style="color: #ffaa00; font-size: 1.2rem;">+${nudgesEarned} Nudge${nudgesEarned > 1 ? 's' : ''} Earned!</p>
                    <div class="nudge-controls">
                        ${[0, 1, 2, 3, 4].map(i => `
                            <button class="nudge-btn" onclick="nudgeReel(${i}, -1)">Down &#8595;</button>
                            <button class="nudge-btn" onclick="nudgeReel(${i}, 1)">Up &#8593;</button>
                        `).join('')}
                    </div>
                    <p style="color: #999; font-size: 0.9rem; margin-top: 15px;">Nudges available: ${nudgesAvailable}</p>
                    <p style="color: #666; font-size: 0.8rem;">Nudge any reel multiple times!</p>
                `;
                
            } else {
                display.innerHTML = `
                    <div class="result-message" style="color: #999;">Not a winner</div>
                    <p style="color: #666;">Try again!</p>
                `;
            }
        }

        function nudgeReel(reelIndex, direction) {
            if (nudgesAvailable <= 0 || spinning) return;
            
            nudgesAvailable--;
            updateDisplay();
            
            const itemH = getItemHeight();
            let currentCenter = Math.floor(Math.abs(reelPositions[reelIndex]) / itemH) + 1;
            let targetCenter = currentCenter - direction;
            
            const strip = document.getElementById(`strip${reelIndex}`);
            
            // Handle low boundary (prepend if needed)
            while (targetCenter < 1) {
                const newItem = createRandomItem();
                strip.insertBefore(newItem, strip.firstChild);
                reelPositions[reelIndex] -= itemH; // Adjust to keep visual consistent
                currentCenter++;
                targetCenter++;
                reelSizes[reelIndex]++;
            }
            
            // Handle high boundary (append if needed)
            while (targetCenter > reelSizes[reelIndex]) {
                const newItem = createRandomItem();
                strip.appendChild(newItem);
                reelSizes[reelIndex]++;
            }
            
            // Animate to target
            reelPositions[reelIndex] = -((targetCenter - 1) * itemH);
            updateReelPosition(reelIndex, true);
            
            // Check for win after nudge
            setTimeout(() => {
                const result = checkWin();
                displayResult(result);
                updateDisplay();
                saveGameState();
            }, 400);
        }

        function generateWinCode(result) {
            // Simple code generation - can be expanded
            const prefix = result.type === 'color_perfect' ? 'COLOR-' : 'MODEL-';
            const codeText = prefix + result.value.toUpperCase() + '-' + Math.random().toString(36).substring(2, 7).toUpperCase();
            return { text: codeText, cars: result.cars };
        }

        function saveWin(code, result) {
            let wins = JSON.parse(localStorage.getItem('garageSlotsWins')) || [];
            wins.push({ code: code.text, cars: result.cars, timestamp: new Date().toISOString() });
            localStorage.setItem('garageSlotsWins', JSON.stringify(wins));
        }

        function showWins() {
            const modal = document.getElementById('winsModal');
            const list = document.getElementById('winList');
            list.innerHTML = '';
            
            let wins = JSON.parse(localStorage.getItem('garageSlotsWins')) || [];
            
            if (wins.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #999;">No wins yet!</p>';
            } else {
                wins.forEach(win => {
                    const item = document.createElement('div');
                    item.className = 'win-item';
                    item.innerHTML = `
                        <p style="color: #ffcc00;">${win.code}</p>
                        <div class="code-cars">
                            ${win.cars.map(num => `
                                <div class="code-car">
                                    <img src="${IMAGE_BASE}${num}.png" alt="Car ${num}">
                                </div>
                            `).join('')}
                        </div>
                        <p style="color: #666; font-size: 0.8rem; margin-top: 10px;">${new Date(win.timestamp).toLocaleString()}</p>
                    `;
                    list.appendChild(item);
                });
            }
            
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('winsModal').style.display = 'none';
        }

        function showHowToWin() {
            const modal = document.getElementById('howToWinModal');
            const grid = document.getElementById('howToWinGrid');
            grid.innerHTML = '';
            
            // Color lines
            Object.entries(WINNING_LINES.color).forEach(([color, nums]) => {
                const line = document.createElement('div');
                line.className = 'win-line';
                line.innerHTML = `
                    <div class="line-title">All ${color}</div>
                    <div class="line-cars">
                        ${nums.map(num => `
                            <div class="line-car">
                                <img src="${IMAGE_BASE}${num}.png" alt="Car ${num}">
                            </div>
                        `).join('')}
                    </div>
                `;
                grid.appendChild(line);
            });
            
            // Model lines
            Object.entries(WINNING_LINES.model).forEach(([model, nums]) => {
                const line = document.createElement('div');
                line.className = 'win-line';
                line.innerHTML = `
                    <div class="line-title">All ${model}</div>
                    <div class="line-cars">
                        ${nums.map(num => `
                            <div class="line-car">
                                <img src="${IMAGE_BASE}${num}.png" alt="Car ${num}">
                            </div>
                        `).join('')}
                    </div>
                `;
                grid.appendChild(line);
            });
            
            modal.style.display = 'block';
        }

        function closeHowToWinModal() {
            document.getElementById('howToWinModal').style.display = 'none';
        }

        function shareWin() {
            if (!currentResult) return;
            
            const code = generateWinCode(currentResult); // Regenerate if needed
            const text = `I won a PERFECT ${currentResult.value} line in Carcophony Garage Slots! Code: ${code.text} #CarcophonySlots`;
            const url = 'https://carcophony.github.io/car-lottery/garage-slots.html'; // Update to your URL
            
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        }

        function updateDisplay() {
            document.getElementById('nudgesDisplay').textContent = nudgesAvailable;
            document.getElementById('spinsDisplay').textContent = totalSpins;
            document.getElementById('winsDisplay').textContent = totalWins;
        }

        function saveGameState() {
            localStorage.setItem('garageSlotsState', JSON.stringify({
                nudgesAvailable,
                totalSpins,
                totalWins
            }));
        }

        function loadGameState() {
            const state = JSON.parse(localStorage.getItem('garageSlotsState'));
            if (state) {
                nudgesAvailable = state.nudgesAvailable;
                totalSpins = state.totalSpins;
                totalWins = state.totalWins;
            }
        }

        init();
    </script>
</body>
</html>
